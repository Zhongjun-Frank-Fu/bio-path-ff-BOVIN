name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Concurrency: 同一分支有新 push 就取消旧的
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.4.10
      - name: Ruff check
        run: ruff check bovin_demo tests
      - name: Ruff format check
        run: ruff format --check bovin_demo tests

  test:
    name: Test (pytest · CPU)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install torch (CPU)
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch==2.3.1
      - name: Install package (dev extras)
        run: |
          pip install -e ".[dev]"
      - name: Smoke import
        run: python -c "import bovin_demo; print(bovin_demo.__version__)"
      - name: Pytest
        run: pytest -v --tb=short

  docker:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: bovin-pathway-demo:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run import smoke in container
        run: |
          docker run --rm bovin-pathway-demo:ci \
            python -c "import bovin_demo; print('[ci] OK')"
